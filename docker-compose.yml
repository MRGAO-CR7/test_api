# =============================================================================
# Local development stack for test_api.
#
# This compose project runs ONLY the test_api services (nginx + php-fpm). It
# joins the externally-managed `bbm` bridge network so:
#
#   * test_frontend's BFF can reach us as   http://test_api_webserver:8000
#   * we can reach the shared MySQL as      docker-mysql-1:3306
#
# The `bbm` network must already exist (it is created by auth_service's
# compose project). If it is missing, run:
#
#       docker network create bbm
#
# Quick-start:
#       docker compose up --build -d
#       docker compose logs -f test_api_php
#       curl http://localhost:8009/api/v1/health
#       docker compose down            # keep volumes (vendor cache, etc.)
#       docker compose down -v         # wipe volumes (slow next boot)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # nginx — terminates HTTP and reverse-proxies to php-fpm via FastCGI.
  # MUST be named `test_api_webserver` because test_frontend's BFF env points
  # at exactly that hostname inside the bbm network.
  # ---------------------------------------------------------------------------
  test_api_webserver:
    image: nginx:1.27-alpine
    container_name: test_api_webserver
    depends_on:
      - test_api_php
    networks: [bbm]
    ports:
      - '8009:8000'
    volumes:
      - .:/var/www/html:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      # Use 127.0.0.1 explicitly: nginx listens on IPv4 only, but BusyBox wget
      # in alpine resolves "localhost" to ::1 first which would refuse.
      test: ['CMD-SHELL', 'wget -q -O - http://127.0.0.1:8000/api/v1/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # php-fpm — runs the Laravel app code.
  # We use a named volume for vendor/ so the linux-built dependencies aren't
  # shadowed by macOS ones from the host bind-mount. Same pattern as
  # test_frontend uses for node_modules.
  # ---------------------------------------------------------------------------
  test_api_php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: test_api:dev
    container_name: test_api_php
    working_dir: /var/www/html
    networks: [bbm]
    volumes:
      - .:/var/www/html:cached
      - vendor-data:/var/www/html/vendor
    environment:
      # ---- Laravel ----
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_URL: http://localhost:8009
      LOG_CHANNEL: stack
      LOG_LEVEL: debug

      # ---- DB: reach MySQL via bbm DNS instead of host.docker.internal ----
      # docker-mysql-1 is the existing MySQL container on bbm (managed by a
      # different compose project). Same credentials as host dev.
      DB_CONNECTION: mysql
      DB_HOST: docker-mysql-1
      DB_PORT: '3306'
      DB_DATABASE: test
      DB_USERNAME: root
      DB_PASSWORD: rootpass

      # ---- Stateless service: no sessions / no queues / cheap drivers ----
      SESSION_DRIVER: array
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      BROADCAST_CONNECTION: log
      MAIL_MAILER: log

      # ---- Composer ----
      COMPOSER_ALLOW_SUPERUSER: '1'
      COMPOSER_NO_INTERACTION: '1'
    restart: unless-stopped

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  # Linux-built Composer vendor/. Wiped only on `docker compose down -v`.
  vendor-data:

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  bbm:
    name: bbm
    external: true
