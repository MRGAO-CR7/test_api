# =============================================================================
# test_api — nginx vhost
# =============================================================================
#
# Listen on 8000 inside the container (the bbm-DNS-reachable port). The host
# port mapping (8009 -> 8000) is in docker-compose.yml. Other services on the
# `bbm` network reach this vhost as `http://test_api_webserver:8000`.
# =============================================================================

server {
    listen 8000;
    server_name _;

    root /var/www/html/public;
    index index.php;

    charset utf-8;

    # Increase if you ever proxy uploads through here (Phase 5+).
    client_max_body_size 16m;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Keep error pages going through Laravel so the JSON envelope wins.
    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass test_api_php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_buffers          16 16k;
        fastcgi_buffer_size      32k;
        fastcgi_read_timeout     30s;
        fastcgi_connect_timeout  5s;
    }

    # Hide dotfiles like .env, .git, etc.
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
